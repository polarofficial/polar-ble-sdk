plugins {
    id('com.android.library')
    id('kotlin-android')
    id('com.google.protobuf')
    id("org.jetbrains.dokka") version "1.9.20"
    id("maven-publish")
}

import java.util.regex.Pattern

def getVersion = { ->
    def result = providers.exec {
        commandLine 'git', 'describe', '--tags'
    }
    def stdout = result.standardOutput.asText.get().trim()
    def pattern = Pattern.compile("^([0-9]*)(\\.)([0-9]*)(\\.)([0-9]*)")
    def matcher = pattern.matcher(stdout)
    if (matcher.matches()) {
        String MAJOR = matcher.group(1)
        String MINOR = matcher.group(3)
        String PATCH = matcher.group(5)
        def VERSION = MAJOR + "." + MINOR + "." + PATCH
        println VERSION
        return VERSION
    } else {
        return stdout
    }
}

configurations.all {
    resolutionStrategy {
        force 'net.bytebuddy:byte-buddy:1.14.18'
        force 'net.bytebuddy:byte-buddy-agent:1.14.18'
        force "org.jetbrains.kotlin:kotlin-metadata-jvm:2.3.20"
    }
}


android {
    namespace = 'com.polar.androidcommunications'

    defaultConfig {
        compileSdk 35
        minSdkVersion 33
        targetSdkVersion 33
        versionCode 14
        versionName "14"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildFeatures {
        buildConfig = true
    }

    buildTypes.all { buildType ->
        def version = getVersion()
        buildConfigField 'String', 'GIT_VERSION', "\"$version\""
    }

    buildTypes {
        release {
            consumerProguardFiles 'lib-proguard-rules.pro'
        }
    }

    flavorDimensions 'library'
    productFlavors {
        sdk {
            dimension "library"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    publishing {
        singleVariant("androidCommunicationsRelease") {
            withSourcesJar()
            withJavadocJar()
        }
    }

    packagingOptions {
        exclude "**/*.proto"
    }
}

afterEvaluate {
    publishing {
        publications {
            aar(MavenPublication) {
                from components.sdkRelease
                groupId = 'com.github.polarofficial'
                artifactId = 'polar-ble-sdk'
                version = getVersion()
            }
        }
    }
}

tasks.dokkaJavadoc.configure {
    outputDirectory.set(file("docs/"))
    dokkaSourceSets {
        named("main") {
            perPackageOption {
                matchingRegex.set(".*\\.androidcommunications.*")
                suppress.set(true)
            }
        }
    }
}

protobuf {
    protoc {
        artifact = "com.google.protobuf:protoc:3.20.0"
    }
    generateProtoTasks {
        all().each { task ->
            task.builtins {
                java {
                    option "lite"
                }
            }
        }
    }
}

dependencies {
    implementation 'commons-io:commons-io:2.11.0'
    implementation 'androidx.annotation:annotation:1.6.0'
    implementation "androidx.core:core-ktx:1.9.0"
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.1.20"
    implementation 'com.google.protobuf:protobuf-javalite:3.20.0'
    implementation 'com.squareup.retrofit2:retrofit:2.9.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.9.0'
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-core:1.10.2"
    implementation "org.jetbrains.kotlinx:kotlinx-coroutines-rx3:1.10.2"
    sdkImplementation 'com.google.protobuf:protobuf-javalite:3.20.0'
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.23.0'
    testImplementation 'io.mockk:mockk:1.14.9'
    testImplementation 'androidx.test:runner:1.7.0'
    testImplementation 'androidx.test.espresso:espresso-core:3.7.0'
    testImplementation "org.jetbrains.kotlinx:kotlinx-coroutines-test:1.10.2"
    androidTestImplementation 'junit:junit:4.13.2'
    androidTestImplementation 'androidx.test:core:1.7.0'
    androidTestImplementation 'androidx.test:runner:1.7.0'
    androidTestImplementation 'androidx.test:rules:1.7.0'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.2'
}
